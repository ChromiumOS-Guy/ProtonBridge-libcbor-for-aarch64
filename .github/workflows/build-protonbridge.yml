name: Build Proton Bridge

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Define the architectures to build
        include:
          - arch: amd64
            goarch: amd64
          - arch: arm64
            goarch: arm64
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: ProtonMail/proton-bridge
          fetch-depth: 0

      - name: Apply patch
        # Assumes arm64.patch is in the root of your local repository
        run: git apply ./proton-bridge-arm64-linux.patch

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libsecret-1-dev pkg-config

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0' # Matches the requirement in BUILDS.md

      - name: Build Proton Bridge (nogui)
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1 # Required for libsecret
          # Ensure cross-compiler is used for CGO if necessary
          CC: ${{ matrix.goarch == 'arm64' && 'aarch64-linux-gnu-gcc' || 'gcc' }}
        run: |
          if [ "${{ matrix.goarch }}" == "arm64" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
          fi
          make build-nogui

      - name: Rename and Upload Artifact
        run: |
          mkdir -p output
          mv bridge output/bridge-${{ matrix.arch }}
          
      - uses: actions/upload-artifact@v4
        with:
          name: bridge-${{ matrix.arch }}
          path: output/bridge-${{ matrix.arch }}
