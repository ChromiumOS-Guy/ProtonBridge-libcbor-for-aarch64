name: Build Proton Bridge (Native ARM64)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-arm64:
    # Use GitHub's native ARM64 runner
    runs-on: ubuntu-24.04-arm
    
    steps:
      - name: Checkout main code
        uses: actions/checkout@v4
        with:
          repository: ProtonMail/proton-bridge
          path: bridge-source

      - name: Checkout local patch
        uses: actions/checkout@v4
        with:
          path: this-repo

      - name: Apply patch
        run: |
          cd bridge-source
          git apply ../this-repo/proton-bridge-arm64-linux.patch

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libsecret-1-dev pkg-config libfido2-dev

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'

      - name: Build and Install libcbor
        run: |
          # 1. Clone and build libcbor
          git clone https://github.com/PJK/libcbor.git
          cd libcbor
          git checkout v0.11.0
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=ON ..
          make
          sudo make install
          # 2. Update the linker cache so the system finds the new library
          sudo ldconfig

      - name: Build Proton Bridge
        run: |
          cd bridge-source
          # Since we are on a native ARM64 runner, just run the build command
          # If 'make build-nogui' is missing, use 'make build' or 'go build'
          make build-nogui
          # After building, find the binary and move it to the workspace root
          find . -name bridge -type f -executable -exec cp {} ../bridge-arm64 \;

      - name: Prepare and Package
        run: |
          # Create a deployment directory
          mkdir -p deploy
          
          # Copy binaries (find them based on output path)
          # Note: ensure these paths match your actual binary locations
          find bridge-source -name "bridge" -type f -executable -exec cp {} deploy/bridge \;
          find bridge-source -name "proton-bridge" -type f -executable -exec cp {} deploy/proton-bridge \;
          
          # Copy libcbor shared libraries
          cp libcbor/build/src/libcbor.so* deploy/
          
          # Run patchelf
          cd deploy
          patchelf --add-rpath . bridge
          patchelf --add-rpath . proton-bridge
          
          # Zip the contents
          zip -r bridge-package.zip .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bridge-arm64-package
          path: deploy/bridge-package.zip
