name: Build Proton Bridge

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            goarch: amd64
          - arch: arm64
            goarch: arm64
    
    steps:
      - name: Checkout main code
        uses: actions/checkout@v4
        with:
          repository: ProtonMail/proton-bridge
          path: bridge-source

      - name: Checkout local patch
        uses: actions/checkout@v4
        with:
          path: this-repo

      - name: Setup environment and apply patch
        run: |
          cd bridge-source
          # Ensure you use the exact filename provided in your repo
          git apply ../this-repo/proton-bridge-arm64-linux.patch

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libsecret-1-dev pkg-config libfido2-dev
          
          # Install cross-compiler for arm64
          if [ "${{ matrix.goarch }}" == "arm64" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'

      - name: Build Proton Bridge
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CC: ${{ matrix.goarch == 'arm64' && 'aarch64-linux-gnu-gcc' || 'gcc' }}
        run: |
          cd bridge-source
          # Try the standard make build first
          make build
          # If 'build' creates a directory structure, locate your binary
          # It is likely in ./cmd/bridge/ or similar, check with 'find . -name bridge'
          cp ./cmd/bridge/bridge ../bridge-${{ matrix.arch }} || cp bridge ../bridge-${{ matrix.arch }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bridge-${{ matrix.arch }}
          path: bridge-${{ matrix.arch }}
